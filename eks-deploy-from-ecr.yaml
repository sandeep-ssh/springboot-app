apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-springboot-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: springboot-app
  template:
    metadata:
      labels:
        app: springboot-app
    spec:
      containers:
        - name: my-springboot-app
          image: sandeeph.azurecr.io/acr-repo1:15
          imagePullPolicy: Always
          ports:
            - containerPort: 8085

---
# Service type: LoadBalancer
apiVersion: v1
kind: Service
metadata:
  name: springboot-app
  labels:
    app: springboot-app
    k8s-app: springboot-app
spec:
  type: LoadBalancer
  selector:
    app: springboot-app
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 8085